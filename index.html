<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>アスカ</title>

<link rel="stylesheet" href="style.css">

<!-- アプリアイコン -->
<link rel="apple-touch-icon" href="icon.png">

<!-- iPhoneアプリ表示 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="アスカ">

</head>

<body>

<!-- トップ画面 -->
<main id="homeScreen" class="screen active">

<div class="overlay"></div>

<section class="home-content">

<h1 class="app-title">アスカ</h1>

<div class="start-message">
<p>アスカ：</p>
<p>遅かったじゃない。</p>
<p>今日は何するの？</p>
</div>

<button onclick="startChat('talk')">
アスカ、話そう
</button>

<button onclick="startChat('consult')">
アスカ、相談
</button>

<button onclick="startChat('strategy')">
アスカ、作戦会議
</button>

</section>

</main>


<!-- 会話画面 -->
<main id="chatScreen" class="screen">

<header>

<h2>アスカ</h2>

<p id="modeLabel"></p>

</header>


<div id="chatArea">

<div class="asuka-message">
アスカ：さて、話してみなさいよ。
</div>

</div>


<div class="input-area">

<input
type="text"
id="userInput"
placeholder="メッセージ入力"
/>

<button onclick="sendMessage()">
送信
</button>

</div>

</main>


<script src="script.js"></script>

</body>
</html>
